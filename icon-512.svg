  <text x="255" y="430" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="82" fill="url(#accentGrad)" letter-spacing="-3" filter="url(#glowGreen)">PY</text>
  <text x="256" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#ffffff" fill-opacity="0.35" text-anchor="middle" letter-spacing="4">TRIBUTACIÓN INTELIGENTE</text>
